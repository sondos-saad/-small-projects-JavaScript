<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="py-5">
        <div class="container">
            <a href="wishList.html">Wish List</a>
            <div class="row g-3 my-5" id="show_data">
                <div class="col-md-4">
                    <div class="product bg-body">
                        <span>On Sale</span>
                        <div class="product-img">
                            <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?q=80&w=2942&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="" class="w-100">
                        </div>
                        <div class="product_details text-center p-3">
                            <h2 class="product_name">Laptop</h2>
                            <div class="product_price d-flex justify-content-between align-items-center">
                                <h6 >Price: $2000</h6>
                                <h6 > Count: 10</h6>
                            </div>
                            <button class="btn btn-danger">Add To WishList</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>


    <script src="script.js"></script>
</body>

</html>
