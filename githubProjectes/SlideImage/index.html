<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider Image Js</title>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="sliders">
            <div class="slider-item fade">
                <img src="photo1" alt="">
                <div class="text">Photo 1</div>
            </div>
            <div class="slider-item fade">
                <img src="photo2" alt="">
                <div class="text">Photo 2</div>
            </div>
            <div class="slider-item fade">
                <img src="photo1" alt="">
                <div class="text">Photo 3</div>
            </div>
            <div class="slider-item fade">
                <img src="photo2" alt="">
                <div class="text">Photo 4</div>
            </div>
            <div class="slider-item fade">
                <img src="photo1" alt="">
                <div class="text">Photo 5</div>
            </div>
            <div class="slider-item fade">
                <img src="photo2" alt="">
                <div class="text">Photo 6</div>
            </div>
            <div class="arrow">
                <button class="perv" onclick="arrowSlider(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="next" onclick="arrowSlider(1)"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
