<!DOCTYPE html>
<html lang="en">
<link>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dots Menu</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body> 

    <div class="navigation">
        <span style="--i:0; --x:-1; --y:0"><ion-icon name="chatbubble-ellipses-outline"></ion-icon></span>
        <span style="--i:1; --x:1; --y:0"><ion-icon name="desktop-outline"></ion-icon></span>
        <span style="--i:2; --x:0; --y:-1"><ion-icon name="image-outline"></ion-icon></span>
        <span style="--i:3; --x:0; --y:1"><ion-icon name="mic-circle-outline"></ion-icon></span>
        <span style="--i:4; --x:1; --y:1"><ion-icon name="mail-open-outline"></ion-icon></span>
        <span style="--i:5; --x:-1; --y:-1"><ion-icon name="notifications-outline"></ion-icon></span>
        <span style="--i:6; --x:0; --y:0"><ion-icon name="person-circle-outline"></ion-icon></span>
        <span style="--i:7; --x:-1; --y:1"><ion-icon name="videocam-outline"></ion-icon></span>
        <span style="--i:8; --x:1; --y:-1"><ion-icon name="storefront-outline"></ion-icon></span>
    </div>
</body>

<script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
<script>
    let navigation = document.querySelector('.navigation')
    navigation.onclick = function(){
        navigation.classList.toggle('active')
    }
</script>
</html>
